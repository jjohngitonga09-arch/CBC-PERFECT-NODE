  <text x="64" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="white">you?</text>

  <!-- ── KID 2 (right, purple top, happy response) ── -->
  <rect x="206" y="112" width="26" height="32" rx="5" fill="#8B5CF6"/>
  <rect x="207" y="140" width="11" height="22" rx="3" fill="#2c2c2c"/>
