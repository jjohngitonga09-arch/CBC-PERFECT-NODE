  <line x1="231" y1="120" x2="244" y2="108" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <line x1="215" y1="162" x2="211" y2="183" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <line x1="227" y1="162" x2="231" y2="183" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="210" cy="185" rx="9" ry="5" fill="#4a2c0a"/>
  <ellipse cx="232" cy="185" rx="9" ry="5" fill="#4a2c0a"/>

  <!-- ── SPEECH BUBBLE kid 2 ── -->
  <rect x="170" y="28" width="128" height="44" rx="12" fill="#8B5CF6" stroke="#6D28D9" stroke-width="2.5"/>
  <polygon points="212,72 200,86 224,72" fill="#8B5CF6"/>
