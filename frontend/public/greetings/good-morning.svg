<svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg" font-family="Arial Rounded MT Bold, Arial, sans-serif">
  <defs>
    <linearGradient id="gm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89CFF0"/>
      <stop offset="100%" stop-color="#D9F0FF"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="300" height="210" fill="url(#gm-sky)"/>

  <!-- Sun -->
  <circle cx="252" cy="42" r="26" fill="#FFD700"/>
  <g stroke="#FFD700" stroke-width="4" stroke-linecap="round">
    <line x1="252" y1="8"  x2="252" y2="1"/>
    <line x1="252" y1="76" x2="252" y2="83"/>
    <line x1="218" y1="42" x2="211" y2="42"/>
    <line x1="286" y1="42" x2="293" y2="42"/>
    <line x1="228" y1="18" x2="223" y2="13"/>
    <line x1="276" y1="66" x2="281" y2="71"/>
    <line x1="276" y1="18" x2="281" y2="13"/>
    <line x1="228" y1="66" x2="223" y2="71"/>
  </g>
  <!-- Sun glow rings -->
  <circle cx="252" cy="42" r="34" fill="none" stroke="#FFD70055" stroke-width="6"/>

  <!-- Ground -->
  <rect y="160" width="300" height="50" fill="#5A9E3A"/>
  <rect y="157" width="300" height="10" fill="#7BC142"/>
  <!-- Dirt path to school -->
  <path d="M120 160 L145 160 L160 210 L105 210 Z" fill="#C4A26E"/>

  <!-- ── GRANDMA (left, x≈72) ── -->
  <!-- Kitenge dress with pattern -->
  <path d="M57 104 Q72 98 87 104 L93 162 H51 Z" fill="#E07B39"/>
  <line x1="51" y1="118" x2="93" y2="118" stroke="#FFD700" stroke-width="2.5" opacity="0.75"/>
  <line x1="50" y1="130" x2="94" y2="130" stroke="#FFD700" stroke-width="2.5" opacity="0.75"/>
  <line x1="50" y1="142" x2="94" y2="142" stroke="#CC3300" stroke-width="2" opacity="0.6"/>
  <!-- Neck -->
  <rect x="67" y="96" width="10" height="10" rx="3" fill="#C17F4B"/>
  <!-- Head -->
  <circle cx="72" cy="82" r="17" fill="#C17F4B"/>
  <!-- Grey headwrap/scarf -->
  <path d="M55 80 Q72 58 89 80 L89 73 Q72 53 55 73 Z" fill="#A0A0A0"/>
  <path d="M84 73 Q88 66 93 68 Q90 76 89 80" fill="#888"/>
  <!-- Eyes -->
  <circle cx="66" cy="80" r="2.5" fill="#1a1a1a"/>
  <circle cx="78" cy="80" r="2.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="67" cy="79" r="0.9" fill="white"/>
  <circle cx="79" cy="79" r="0.9" fill="white"/>
  <!-- Happy wrinkle lines (elder) -->
  <path d="M61 76 Q63 74 65 76" stroke="#8D5524" stroke-width="1.2" fill="none"/>
  <path d="M79 76 Q81 74 83 76" stroke="#8D5524" stroke-width="1.2" fill="none"/>
  <!-- Smile -->
  <path d="M65 88 Q72 95 79 88" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Walking stick (right hand) -->
  <line x1="88" y1="112" x2="103" y2="164" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
  <line x1="97" y1="164" x2="110" y2="164" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
  <!-- Right arm holding stick -->
  <line x1="85" y1="115" x2="92" y2="126" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left arm raised in greeting -->
  <line x1="59" y1="112" x2="45" y2="100" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Hand wave -->
  <circle cx="43" cy="98" r="5" fill="#C17F4B"/>
  <!-- Legs -->
  <line x1="64" y1="162" x2="60" y2="182" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="80" y1="162" x2="84" y2="182" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="59" cy="184" rx="8" ry="4.5" fill="#4a2c0a"/>
  <ellipse cx="85" cy="184" rx="8" ry="4.5" fill="#4a2c0a"/>

  <!-- ── GRANDMA SPEECH BUBBLE ── -->
  <rect x="2" y="40" width="118" height="28" rx="12" fill="white" stroke="#E07B39" stroke-width="2.5"/>
  <polygon points="54,68 44,78 66,68" fill="white"/>
  <polygon points="54,68 44,78 66,68" fill="none" stroke="#E07B39" stroke-width="1.5"/>
  <text x="61" y="58" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#E07B39">Good Morning!</text>

  <!-- ── CHILD (right, x≈210, school uniform + backpack) ── -->
  <!-- Blue school shirt -->
  <rect x="198" y="110" width="26" height="34" rx="5" fill="#3B6FDB"/>
  <!-- Collar -->
  <path d="M204 110 L211 116 L218 110" fill="white" stroke="white" stroke-width="1"/>
  <!-- Dark shorts -->
  <rect x="199" y="140" width="11" height="20" rx="3" fill="#1a1a1a"/>
  <rect x="212" y="140" width="11" height="20" rx="3" fill="#1a1a1a"/>
  <!-- Red backpack -->
  <rect x="222" y="112" width="17" height="26" rx="5" fill="#E53935"/>
  <rect x="224" y="117" width="13" height="7" rx="2" fill="#EF9A9A"/>
  <rect x="225" y="112" width="3" height="26" rx="1" fill="#C62828" opacity="0.5"/>
  <rect x="232" y="112" width="3" height="26" rx="1" fill="#C62828" opacity="0.5"/>
  <!-- Neck -->
  <rect x="206" y="102" width="10" height="10" rx="3" fill="#C17F4B"/>
  <!-- Head -->
  <circle cx="211" cy="88" r="16" fill="#C17F4B"/>
  <!-- Hair -->
  <path d="M195 86 Q211 68 227 86 L226 79 Q211 62 196 79 Z" fill="#2c1810"/>
  <!-- Eyes -->
  <circle cx="205" cy="86" r="2.5" fill="#1a1a1a"/>
  <circle cx="217" cy="86" r="2.5" fill="#1a1a1a"/>
  <circle cx="206" cy="85" r="0.9" fill="white"/>
  <circle cx="218" cy="85" r="0.9" fill="white"/>
  <!-- Big smile -->
  <path d="M204 94 Q211 102 218 94" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Arm waving back at grandma -->
  <line x1="200" y1="120" x2="186" y2="108" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="184" cy="106" r="5" fill="#C17F4B"/>
  <!-- Other arm swinging forward -->
  <line x1="222" y1="120" x2="234" y2="134" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Walking legs -->
  <line x1="204" y1="160" x2="198" y2="182" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="216" y1="160" x2="223" y2="182" stroke="#C17F4B" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="197" cy="184" rx="9" ry="4.5" fill="#1a1a1a"/>
  <ellipse cx="224" cy="184" rx="9" ry="4.5" fill="#1a1a1a"/>

  <!-- ── CHILD SPEECH BUBBLE ── -->
  <rect x="158" y="40" width="140" height="28" rx="12" fill="white" stroke="#3B6FDB" stroke-width="2.5"/>
  <polygon points="196,68 184,78 208,68" fill="white"/>
  <polygon points="196,68 184,78 208,68" fill="none" stroke="#3B6FDB" stroke-width="1.5"/>
  <text x="228" y="58" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#3B6FDB">Good Morning too!</text>
</svg>