<svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg" font-family="Arial Rounded MT Bold, Arial, sans-serif">
  <defs>
    <linearGradient id="h-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B5EAD7"/>
      <stop offset="100%" stop-color="#E8FDF5"/>
    </linearGradient>
  </defs>
  <rect width="300" height="210" fill="url(#h-sky)"/>

  <!-- Ground -->
  <rect y="162" width="300" height="48" fill="#5A9E3A"/>
  <rect y="159" width="300" height="9" fill="#7BC142"/>

  <!-- Trees background -->
  <circle cx="20"  cy="120" r="25" fill="#4A8C2A"/>
  <circle cx="8"   cy="130" r="20" fill="#3D7A22"/>
  <rect x="13"  y="140" width="14" height="25" fill="#8B6914"/>
  <circle cx="280" cy="120" r="25" fill="#4A8C2A"/>
  <circle cx="292" cy="130" r="20" fill="#3D7A22"/>
  <rect x="273" y="140" width="14" height="25" fill="#8B6914"/>

  <!-- ── KID 1 (left, casual yellow T-shirt, facing right) x≈85 ── -->
  <!-- Yellow T-shirt -->
  <rect x="72" y="110" width="26" height="32" rx="5" fill="#FFD700"/>
  <!-- Green shorts -->
  <rect x="73" y="138" width="11" height="22" rx="3" fill="#4A7C59"/>
  <rect x="86" y="138" width="11" height="22" rx="3" fill="#4A7C59"/>
  <!-- Neck -->
  <rect x="80" y="101" width="10" height="11" rx="3" fill="#C17F4B"/>
  <!-- Head -->
  <circle cx="85" cy="87" r="17" fill="#C17F4B"/>
  <!-- Hair (short curly) -->
  <path d="M68 85 Q85 65 102 85 L101 77 Q85 59 69 77 Z" fill="#2c1810"/>
  <!-- Eyes wide open -->
  <circle cx="79" cy="85" r="3" fill="#1a1a1a"/>
  <circle cx="91" cy="85" r="3" fill="#1a1a1a"/>
  <circle cx="80" cy="84" r="1.1" fill="white"/>
  <circle cx="92" cy="84" r="1.1" fill="white"/>
  <!-- Big happy smile showing teeth -->
  <path d="M77 94 Q85 103 93 94" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M79 94 Q85 100 91 94" fill="white"/>
  <!-- Right arm waving HIGH toward kid 2 -->
  <line x1="97" y1="118" x2="116" y2="100" stroke="#C17F4B" stroke-width="6" stroke-linecap="round"/>
  <circle cx="118" cy="98" r="6" fill="#C17F4B"/>
  <!-- Fingers (wave) -->
  <line x1="118" y1="92" x2="120" y2="86" stroke="#C17F4B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="121" y1="93" x2="124" y2="87" stroke="#C17F4B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="123" y1="96" x2="127" y2="91" stroke="#C17F4B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm down -->
  <line x1="73" y1="118" x2="62" y2="134" stroke="#C17F4B" stroke-width="6" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="78" y1="160" x2="74" y2="183" stroke="#C17F4B" stroke-width="6" stroke-linecap="round"/>
  <line x1="92" y1="160" x2="96" y2="183" stroke="#C17F4B" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="73" cy="185" rx="9" ry="5" fill="#4a2c0a"/>
  <ellipse cx="97" cy="185" rx="9" ry="5" fill="#4a2c0a"/>

  <!-- ── SPEECH BUBBLE kid 1 ── -->
  <rect x="4" y="44" width="90" height="28" rx="12" fill="#FFD700" stroke="#E0A800" stroke-width="2.5"/>
  <polygon points="72,72 62,84 82,72" fill="#FFD700"/>
  <polygon points="72,72 62,84 82,72" fill="none" stroke="#E0A800" stroke-width="1.5"/>
  <text x="49" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C5A00">Hello!</text>

  <!-- ── KID 2 (right, casual pink top, facing left) x≈215 ── -->
  <!-- Pink T-shirt -->
  <rect x="202" y="110" width="26" height="32" rx="5" fill="#FF6B9D"/>
  <!-- Blue shorts/skirt -->
  <rect x="200" y="138" width="30" height="10" rx="3" fill="#5B8DEF"/>
  <rect x="202" y="145" width="12" height="18" rx="3" fill="#5B8DEF"/>
  <rect x="216" y="145" width="12" height="18" rx="3" fill="#5B8DEF"/>
  <!-- Neck -->
  <rect x="210" y="101" width="10" height="11" rx="3" fill="#8D5524"/>
  <!-- Head -->
  <circle cx="215" cy="87" r="17" fill="#8D5524"/>
  <!-- Braids/pigtails -->
  <path d="M198 84 Q215 64 232 84 L231 76 Q215 58 199 76 Z" fill="#2c1810"/>
  <circle cx="199" cy="82" r="5" fill="#2c1810"/>
  <circle cx="231" cy="82" r="5" fill="#2c1810"/>
  <!-- Ponytail left -->
  <path d="M199 82 L188 95 Q186 102 192 100 Q195 92 200 88" fill="#2c1810"/>
  <!-- Ponytail right -->
  <path d="M231 82 L242 95 Q244 102 238 100 Q235 92 230 88" fill="#2c1810"/>
  <!-- Eyes -->
  <circle cx="209" cy="85" r="3" fill="#1a1a1a"/>
  <circle cx="221" cy="85" r="3" fill="#1a1a1a"/>
  <circle cx="210" cy="84" r="1.1" fill="white"/>
  <circle cx="222" cy="84" r="1.1" fill="white"/>
  <!-- Smile -->
  <path d="M207 94 Q215 103 223 94" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M209 94 Q215 100 221 94" fill="white"/>
  <!-- Left arm waving HIGH -->
  <line x1="203" y1="118" x2="184" y2="100" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <circle cx="182" cy="98" r="6" fill="#8D5524"/>
  <line x1="182" y1="92" x2="180" y2="86" stroke="#8D5524" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="179" y1="93" x2="176" y2="87" stroke="#8D5524" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="177" y1="96" x2="173" y2="91" stroke="#8D5524" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="227" y1="118" x2="238" y2="134" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="208" y1="163" x2="204" y2="185" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <line x1="222" y1="163" x2="226" y2="185" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="203" cy="187" rx="9" ry="5" fill="#4a2c0a"/>
  <ellipse cx="227" cy="187" rx="9" ry="5" fill="#4a2c0a"/>

  <!-- ── SPEECH BUBBLE kid 2 ── -->
  <rect x="206" y="44" width="90" height="28" rx="12" fill="#FF6B9D" stroke="#CC3377" stroke-width="2.5"/>
  <polygon points="228,72 218,84 238,72" fill="#FF6B9D"/>
  <polygon points="228,72 218,84 238,72" fill="none" stroke="#CC3377" stroke-width="1.5"/>
  <text x="251" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Hello!</text>
</svg>