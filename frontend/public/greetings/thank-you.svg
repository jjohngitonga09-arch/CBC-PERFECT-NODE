<svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg" font-family="Arial Rounded MT Bold, Arial, sans-serif">
  <rect width="300" height="210" fill="#FFF0F8"/>

  <!-- Background classroom wall -->
  <rect width="300" height="210" fill="#FFF5FB"/>
  <!-- Hearts floating (joy) -->
  <text x="140" y="30" text-anchor="middle" font-size="18" opacity="0.5">💖</text>
  <text x="200" y="22" text-anchor="middle" font-size="13" opacity="0.4">💕</text>
  <text x="80"  y="25" text-anchor="middle" font-size="13" opacity="0.4">💕</text>

  <!-- ── DESK ── -->
  <rect x="55" y="142" width="190" height="18" rx="6" fill="#D4A76A"/>
  <rect x="55" y="157" width="14" height="32" rx="4" fill="#B8864E"/>
  <rect x="231" y="157" width="14" height="32" rx="4" fill="#B8864E"/>

  <!-- ── KID A (left, receiving pencil, hugging it, super happy) x≈85 ── -->
  <rect x="68" y="108" width="26" height="32" rx="5" fill="#3B6FDB"/>
  <path d="M74 108 L81 114 L88 108" fill="white" stroke="white" stroke-width="1"/>
  <rect x="70" y="136" width="12" height="8" rx="2" fill="#1a1a1a"/>
  <rect x="84" y="136" width="12" height="8" rx="2" fill="#1a1a1a"/>
  <rect x="76" y="100" width="10" height="10" rx="3" fill="#C17F4B"/>
  <circle cx="81" cy="86" r="16" fill="#C17F4B"/>
  <path d="M65 84 Q81 65 97 84 L96 77 Q81 61 66 77 Z" fill="#2c1810"/>
  <!-- Very big smile + rosy cheeks -->
  <circle cx="73" cy="92" r="5" fill="#FF9999" opacity="0.5"/>
  <circle cx="89" cy="92" r="5" fill="#FF9999" opacity="0.5"/>
  <circle cx="75" cy="84" r="3" fill="#1a1a1a"/>
  <circle cx="87" cy="84" r="3" fill="#1a1a1a"/>
  <circle cx="76" cy="83" r="1.1" fill="white"/>
  <circle cx="88" cy="83" r="1.1" fill="white"/>
  <!-- Giant smile showing teeth -->
  <path d="M72 93 Q81 103 90 93" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M74 93 Q81 100 88 93" fill="white"/>
  <!-- Both arms raised in joy, holding pencil -->
  <line x1="68" y1="118" x2="54" y2="104" stroke="#C17F4B" stroke-width="6" stroke-linecap="round"/>
  <line x1="94" y1="116" x2="110" y2="102" stroke="#C17F4B" stroke-width="6" stroke-linecap="round"/>
  <!-- Pencil held in right hand -->
  <rect x="108" y="92" width="36" height="7" rx="3" fill="#FFD700" transform="rotate(-30,108,92)"/>
  <polygon points="140,86 148,90 140,94" fill="#FF6B35" transform="rotate(-30,108,92)"/>

  <!-- THANK YOU speech bubble (big, colorful) -->
  <rect x="2" y="36" width="148" height="48" rx="14" fill="#EC4899" stroke="#BE185D" stroke-width="2.5"/>
  <polygon points="74,84 62,96 86,84" fill="#EC4899"/>
  <polygon points="74,84 62,96 86,84" fill="none" stroke="#BE185D" stroke-width="1.5"/>
  <text x="76" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Thank</text>
  <text x="76" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="white">You! 😊</text>

  <!-- ── KID B (right, just gave pencil, smiling proudly) x≈215 ── -->
  <rect x="202" y="108" width="26" height="32" rx="5" fill="#10B981"/>
  <path d="M208 108 L215 114 L222 108" fill="white" stroke="white" stroke-width="1"/>
  <rect x="204" y="136" width="12" height="8" rx="2" fill="#1a1a1a"/>
  <rect x="218" y="136" width="12" height="8" rx="2" fill="#1a1a1a"/>
  <rect x="210" y="100" width="10" height="10" rx="3" fill="#8D5524"/>
  <circle cx="215" cy="86" r="16" fill="#8D5524"/>
  <path d="M199 84 Q215 65 231 84 L230 77 Q215 61 200 77 Z" fill="#2c1810"/>
  <circle cx="209" cy="84" r="3" fill="#1a1a1a"/>
  <circle cx="221" cy="84" r="3" fill="#1a1a1a"/>
  <circle cx="210" cy="83" r="1.1" fill="white"/>
  <circle cx="222" cy="83" r="1.1" fill="white"/>
  <!-- Proud/warm smile -->
  <path d="M208 93 Q215 101 222 93" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M210 93 Q215 98 220 93" fill="white"/>
  <circle cx="207" cy="92" r="4" fill="#FF9999" opacity="0.5"/>
  <circle cx="223" cy="92" r="4" fill="#FF9999" opacity="0.5"/>
  <!-- Arm waving/gesturing welcome -->
  <line x1="203" y1="118" x2="188" y2="106" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <line x1="227" y1="118" x2="240" y2="130" stroke="#8D5524" stroke-width="6" stroke-linecap="round"/>
  <!-- Kid B speech bubble -->
  <rect x="154" y="40" width="144" height="28" rx="12" fill="#10B981" stroke="#065F46" stroke-width="2"/>
  <polygon points="214,68 202,80 226,68" fill="#10B981"/>
  <polygon points="214,68 202,80 226,68" fill="none" stroke="#065F46" stroke-width="1.5"/>
  <text x="226" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="white">You are welcome!</text>
</svg>