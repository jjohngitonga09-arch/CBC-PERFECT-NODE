version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: eduapp
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: eduapp_dev
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    depends_on: [db, redis]
    env_file: ./backend/.env
    ports: ["4000:4000"]
    volumes: ["./backend:/app", "/app/node_modules"]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    volumes: ["./frontend:/app", "/app/node_modules"]

volumes:
  pgdata:
